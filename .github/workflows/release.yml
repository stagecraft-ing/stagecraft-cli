# Tag-gated prebuilt-binary release (spec 007). Pushing a `v*` tag builds a
# per-triple archive (with a .sha256 sidecar) for each of the five supported
# targets, generates a per-target CycloneDX SBOM and a SLSA build-provenance
# attestation, and attaches everything to the GitHub Release. install.sh
# (curl | sh) consumes the archives.
#
# The version guard dies fast (zero build minutes) when the pushed tag does
# not match the committed Cargo.toml version, so a release can never ship
# assets whose --version output disagrees with its envelope.
#
# Four triples build natively on a matching-arch runner; x86_64-apple-darwin
# cross-compiles on the Apple Silicon runner (Xcode ships the x86_64 SDK)
# because the Intel macos-13 runner is deprecated and queues badly.
#
# Actions are pinned to a full commit SHA with a version comment (same rule
# as ci.yml) so an upstream tag rewrite cannot alter a release build.
# Re-running a tag is idempotent: the publish step updates the same release.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  version-guard:
    name: version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Tag matches the committed Cargo.toml version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "statecraft-cli") | .version')"
          echo "tag=${GITHUB_REF_NAME} crate=${crate_version}"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${crate_version}; bump the version, merge, then retag"
            exit 1
          fi

  build:
    name: build / ${{ matrix.triple }}
    needs: version-guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu }
          # x86_64-apple-darwin cross-compiles on the Apple Silicon runner.
          - { os: macos-latest,     triple: x86_64-apple-darwin }
          - { os: macos-latest,     triple: aarch64-apple-darwin }
          - { os: windows-latest,   triple: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    # id-token + attestations are for the build-provenance attestation over
    # each archive; nothing in this job writes repo contents.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Add target (no-op if native)
        run: rustup target add ${{ matrix.triple }}
      - name: Build release binary
        run: cargo build --release --locked --bin statecraft --target ${{ matrix.triple }}

      - name: Stage archive contents
        shell: bash
        run: |
          set -euo pipefail
          EXT=""; [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          mkdir -p staging
          cp "target/${{ matrix.triple }}/release/statecraft${EXT}" staging/
          cp LICENSE README.md staging/
          echo "ARCHIVE_BASE=statecraft-${GITHUB_REF_NAME}-${{ matrix.triple }}" >> "$GITHUB_ENV"

      - name: Package (tar.gz + sha256) for Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -C staging -czf "${ARCHIVE_BASE}.tar.gz" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          else
            shasum -a 256 "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          fi
          cat "${ARCHIVE_BASE}.tar.gz.sha256"
          echo "ARCHIVE_FILE=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip + sha256) for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = $env:ARCHIVE_BASE
          Compress-Archive -Path staging/* -DestinationPath "$base.zip" -Force
          $hash = (Get-FileHash "$base.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $base.zip" | Out-File -Encoding ascii -NoNewline "$base.zip.sha256"
          Get-Content "$base.zip.sha256"
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE_FILE=$base.zip"

      # Supply-chain evidence (spec 007 §3.4): per-target CycloneDX SBOM read
      # from the committed Cargo.lock, then a provenance attestation whose
      # subject is the archive itself.
      - name: Generate per-target CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ env.ARCHIVE_BASE }}.cdx.json
          upload-artifact: false
      - name: Fail closed if the SBOM has no components
        shell: bash
        run: |
          set -euo pipefail
          n="$(jq '.components | length' "${ARCHIVE_BASE}.cdx.json")"
          echo "SBOM components: $n"
          if [ "$n" -eq 0 ]; then
            echo "::error::refusing to ship an SBOM with zero components (cataloger regression?)"
            exit 1
          fi
      - name: Attest build provenance for the archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.ARCHIVE_FILE }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: archive-${{ matrix.triple }}
          path: |
            statecraft-*.tar.gz
            statecraft-*.tar.gz.sha256
            statecraft-*.zip
            statecraft-*.zip.sha256
            statecraft-*.cdx.json
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true
      - name: List release assets
        run: ls -la dist
      - name: Create or update the GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
